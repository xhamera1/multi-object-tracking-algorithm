# Siatka hiperparametrów: każda lista → iloczyn kartezjański. Klucze muszą być
# polami trackera / runtime (patrz scripts/tune_grid.py: TRACKER_PARAM_KEYS).
#
# --- Uruchomienie (korzeń repo) ---
# Domyślnie: data/evs_mot-train, zapis JSON + nadpisanie config/default.yaml najlepszą siatką.
#
#   python -m scripts.tune_grid
#
# Tylko raport JSON, bez nadpisywania config/default.yaml:
#   python -m scripts.tune_grid --no-write-config
#
# Inny zbiór / ścieżki: patrz python -m scripts.tune_grid --help
#
# Potem test (domyślnie data/evs_mot-test → outputs/test_predictions):
#   python -m scripts.run_test
#
# --- Inne ---
# --base-config ścieżka   — inny plik startowy (najlepszy wynik zawsze → config/default.yaml)
# --grid-config ścieżka   — inna siatka niż ten plik
# --work-dir katalog      — zostawia foldery z predykcjami prób (debug)
# --max-trials N --force  — duża siatka
#
parameters:
  confidence_threshold_high: [0.4, 0.5, 0.6]
  confidence_threshold_low: [0.05, 0.1, 0.15]
  new_track_threshold: [0.0, 0.025, 0.05]
  first_match_cost_max: [0.7, 0.8, 0.9]
  second_match_cost_max: [0.2, 0.3, 0.4]
  max_age: [3, 4, 5]
  min_hits: [1]
